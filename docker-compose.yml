services:
  gitflect:
    # Use the image generated by GHCR:
    image: ghcr.io/isyuricunha/gitflect:latest
    # Or use the Docker Hub image:
    # image: isyuricunha/gitflect:latest
    restart: unless-stopped
    
    # Setting a container name makes it easier to manage locally
    container_name: gitflect
    
    environment:
      # -------------
      # Source Configuration
      # -------------
      - SOURCE_PROVIDER=github
      - SOURCE_TOKEN=ghp_yourpersonalaccesstokenhere12345
      - SOURCE_USER=isyuricunha

      # -------------
      # Destination Configuration
      # -------------
      - DEST_PROVIDER=gitlab
      - DEST_TOKEN=glpat-yourgitlabaccesstokenhere123
      - DEST_USER=isyuricunha
      # Leave DEST_URL empty for gitlab.com. If using self-hosted, fill it:
      - DEST_URL=

      # -------------
      # Mirroring Rules
      # -------------
      # Filters which repositories to fetch from the source: all | public | private
      - REPO_VISIBILITY=all
      # Comma-separated list to only include specific repos (empty = sync all)
      - REPO_INCLUDE=
      # Comma-separated list of repository names to ignore
      - REPO_EXCLUDE=

      # -------------
      # Schedule
      # -------------
      # Interval. If empty, runs once and exits. Ex: 12h, 6h, 30m
      - SYNC_INTERVAL=6h

    volumes:
      # Example mapping to persist logs externally if desired
      - ./logs:/var/log/gitflect
